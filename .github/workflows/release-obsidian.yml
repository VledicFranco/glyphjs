name: Release Obsidian Plugin

on:
  push:
    tags:
      - 'obsidian-v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # Build all workspace packages in dependency order via Turborepo
      - run: pnpm build

      # Build the plugin bundle (outputs main.js to plugin root, no sourcemap)
      - name: Build Obsidian plugin
        run: node esbuild.config.mjs
        working-directory: packages/obsidian-plugin
        env:
          RELEASE_BUILD: 'true'

      # Verify manifest version matches the tag (obsidian-v0.1.0 → 0.1.0)
      - name: Verify manifest version matches tag
        run: |
          TAG="${{ github.ref_name }}"
          EXPECTED="${TAG#obsidian-v}"
          ACTUAL=$(node -p "require('./packages/obsidian-plugin/manifest.json').version")
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "manifest.json version ($ACTUAL) does not match tag ($EXPECTED)"
            exit 1
          fi
          echo "Version OK: $ACTUAL"

      # Publish release to VledicFranco/glyphjs-obsidian with a clean v* tag.
      # BRAT requires plain semver tags (v0.1.0) — the obsidian-v* tags in this
      # monorepo conflict with BRAT's tag parser, so we use a dedicated dist repo.
      #
      # GITHUB_TOKEN is scoped to this repo only and cannot push to glyphjs-obsidian.
      # DIST_REPO_PAT must be a classic PAT with 'repo' scope on the VledicFranco account,
      # stored as a secret in this repository's settings.
      - name: Push release to glyphjs-obsidian distribution repo
        env:
          GH_TOKEN: ${{ secrets.DIST_REPO_PAT }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#obsidian-v}"
          DIST_TAG="v${VERSION}"

          # Clone the distribution repo (GH_TOKEN provides read auth)
          gh repo clone VledicFranco/glyphjs-obsidian dist-repo -- --depth=1
          cd dist-repo

          # Configure git to push using the PAT
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/VledicFranco/glyphjs-obsidian.git"

          # Copy plugin artifacts + manifest
          cp ../packages/obsidian-plugin/main.js .
          cp ../packages/obsidian-plugin/manifest.json .
          cp ../packages/obsidian-plugin/styles.css .

          # Commit updated manifest to the dist repo (BRAT reads it from root)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json main.js styles.css
          git diff --cached --quiet || git commit -m "release: ${DIST_TAG}"
          git push

          # Create the release with clean semver tag
          gh release create "${DIST_TAG}" \
            main.js manifest.json styles.css \
            --repo VledicFranco/glyphjs-obsidian \
            --title "${DIST_TAG}" \
            --notes "GlyphJS Obsidian plugin ${DIST_TAG}. Install via [BRAT](https://github.com/TfTHacker/obsidian42-brat): \`https://github.com/VledicFranco/glyphjs-obsidian\`"
